<mat-toolbar color="primary">
    <span><mat-icon fontIcon="cake" /> Prodavnica igračaka</span>
    <span class="spacer"></span>
    <a routerLink="/" matButton>
        <mat-icon fontIcon="home" />Home
    </a>
    <a routerLink="/about" matButton>
        <mat-icon fontIcon="info" />About
    </a>
    @if(authService.getActiveUser()) {
    <a routerLink="/user" matButton>
        <mat-icon fontIcon="perm_identity" />Account
    </a>
    <button matButton (click)="doLogout()">
        <mat-icon fontIcon="logout" />Log out
    </button>
    } @else {
    <a routerLink="/login" matButton>
        <mat-icon fontIcon="login" />Log in
    </a>
    }
</mat-toolbar>
<div class="wrapper">
    <router-outlet />
</div>
