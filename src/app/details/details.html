@if(toy()) {
<div class="details-wrapper">
    <mat-card class="details-card">
        <mat-card-content>
            <img [src]="utils.getImageUrl(toy()!)" class="details-img">
        </mat-card-content>
    </mat-card>
    <mat-card class="details-card">
        <mat-card-content>
            <h1>{{toy()?.name}}</h1>
            <mat-list>
                <mat-list-item>
                    <mat-icon matListItemIcon>stars</mat-icon>
                    <div matListItemTitle>Opis:</div>
                    <div matListItemLine>{{toy()!.description}}</div>
                </mat-list-item>
                <mat-list-item>
                    <mat-icon matListItemIcon>child_care</mat-icon>
                    <div matListItemTitle>Namenjeno:</div>
                    <div matListItemLine>{{toy()!.targetGroup}}</div>
                </mat-list-item>
                <mat-list-item>
                    <mat-icon matListItemIcon>today</mat-icon>
                    <div matListItemTitle>Datum proizvodnje:</div>
                    <div matListItemLine>{{utils.formatDate(toy()!.productionDate)}}</div>
                </mat-list-item>
                <mat-list-item>
                    <mat-icon matListItemIcon>local_atm</mat-icon>
                    <div matListItemTitle>Cena:</div>
                    <div matListItemLine>{{toy()?.price}} rsd</div>
                </mat-list-item>
            </mat-list>
        </mat-card-content>
        @if(authService.getActiveUser()) {
        <mat-card-actions>

            <a [routerLink]="`/details/${toy()?.toyId}/purchase`" matButton>
                <mat-icon fontIcon="shopping_cart" />Buy now
            </a>
        </mat-card-actions>
        }
    </mat-card>
</div>
} @else {
<app-loading />
}
